<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Love Mall</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#061018;color:white;font-family:monospace}
    canvas{display:block;width:100vw;height:100vh;image-rendering:pixelated}
    .prompt{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:rgba(25,12,18,.92);border:3px solid #ff9dcc;border-radius:12px;color:#ffe18b;font-size:20px;padding:12px 22px;display:none;z-index:5;box-shadow:0 8px 22px #0009}
    #shopModal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(4,10,18,.78);z-index:20;font-family:monospace}
    #shopModal .box{width:min(920px,90vw);max-height:82vh;overflow:auto;background:rgba(25,12,18,.96);border:3px solid #b17142;border-radius:16px;padding:24px;color:white;box-shadow:0 12px 40px #000}
    #shopModal h1{margin-top:0;color:#ff97cf}
    #shopModal button{background:#ff97cf;border:0;border-radius:10px;padding:10px 16px;font-weight:bold;cursor:pointer;margin-bottom:16px}
    .memory-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}
    .memory-card{min-height:120px;border:2px dashed #ff9dcc;border-radius:12px;background:#241820;color:#ffd983;padding:14px}
    .back-btn{position:fixed;left:18px;top:18px;z-index:8;background:rgba(25,12,18,.92);border:3px solid #b17142;border-radius:12px;color:#ffe18b;padding:10px 14px;font-size:16px;text-decoration:none;box-shadow:0 8px 22px #0009}
  </style>
</head>
<body>
  <a class="back-btn" href="index.html">Back</a>
  <canvas id="game"></canvas>
  <div id="prompt" class="prompt"></div>

  <div id="shopModal">
    <div class="box">
      <button onclick="closeShop()">Close</button>
      <h1 id="shopTitle">Shop</h1>
      <p id="shopText">Add memories here later.</p>
      <div class="memory-grid" id="shopCards"></div>
    </div>
  </div>

  <script src="js/outfit-loader.js"></script>
  <script src="js/shopping.js"></script>
  <script src="js/shopping-outfit-entry.js"></script>
  <script src="js/shopping-fun.js"></script>
  <script src="js/shopping-props.js"></script>
  <script src="js/shopping-photo-booth-memory.js"></script>
  <script src="js/him-right-size-fix.js"></script>
  <script src="js/sprite-auto-anchor.js"></script>
</body>
</html>
